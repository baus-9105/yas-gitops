apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-staging-configuration
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/baus-9105/yas-gitops.git
    targetRevision: HEAD
    path: charts/yas-configuration
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true